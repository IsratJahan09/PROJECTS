{% extends "base.html" %}

{% block content %}
        <h2 class="text-center mb-2 ">TODO List</h2> <hr>
    <div class="row">
        <div class="col-md-6 col-sm-12 mx-auto ">
            <form action="{% url 'index' %}" method="post">
                {% csrf_token %}
              <div class="d-flex">
                <input type="text" id="text" name="text" class="form-control me-2" autocomplete="off" placeholder="Create a TODO List..." required>
                <button type="submit" class="btn btn-success btn-sm">Add</button>
              </div>
            </form>

            <div class="my-5">
                <ul class="list-group">
                    {% for todo in todos %}
                    <li class="list-group-item">
                        <div class="d-flex justify-content-between">
                            <span>{{todo.text}}</span>
                            <a class="btn btn-danger btn-sm" href="{% url 'deleteto' todo.id %}">X</a>
                        </div>
                    </li>
                    <br>
                    {% endfor %}  
                </ul>
            </div>

    </div>
</div>
{% endblock %}

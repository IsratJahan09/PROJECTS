<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <style>
        .mt-30px {
            margin-top: 510px;
        }
    </style>
</head>
<body>
    <!-- navbar -->
        <nav class="navbar navbar-expand-lg bg-success  navbar-dark">
            <div class="container-fluid">
              <a class="navbar-brand ms-5" href="{% url 'index' %}">TODO List</a>
              <button class="navbar-toggler" 
              type="button" data-bs-toggle="collapse"
               data-bs-target="#navbarText" 
               aria-controls="navbarText" 
               aria-expanded="false"
               aria-label="Toggle navigation">

                <span class="navbar-toggler-icon"></span>
              </button>

              <div class="collapse navbar-collapse" id="navbarText">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                  <li class="nav-item ">
                    <a class="nav-link me-5 {% if request.path == '/' %} active {% endif %}" aria-current="page" href="{% url 'index' %}">Home</a>
                  </li>
                  <li class="nav-item me-5">
                    <a class="nav-link {% if request.path == '/about/' %} active {% endif %}" href="{% url 'about' %}">About</a>
                  </li>
                  
                </ul>
            
              </div>
            </div>
          </nav>
          <div class="container my-4">
            {% block content %}
            <!-- Content will be injected here -->
            {% endblock %}
          </div>

           <footer class="footer py-3  mt-30px bg-dark text-center text-white">
            Developed by Israt
           </footer>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js" integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D" crossorigin="anonymous"></script>
</body>
</html>
